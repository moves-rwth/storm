name: CI Weekly
# Comprehensive weekly test run across all configurations.
# No cache, not fail-fast, full task suite including deploy.

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  buildTests:
    strategy:
      fail-fast: false
      matrix:
        config:
          # All dependencies image with all optional components disabled
          - {name: "Debug; All dependencies (disabled)",
             buildType: "Debug",
             baseImg: "storm-dependencies:latest",
             disable_cudd: "ON", disable_glpk: "ON", disable_gmm: "ON",
             disable_gurobi: "ON", disable_libarchive: "ON", disable_mathsat: "ON",
             disable_soplex: "ON", disable_spot: "ON", disable_sylvan: "ON",
             disable_xerces: "ON", disable_z3: "ON",
             Developer: "ON", ClnExact: "OFF", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Release; All dependencies (disabled)",
             buildType: "Release",
             baseImg: "storm-dependencies:latest",
             disable_cudd: "ON", disable_glpk: "ON", disable_gmm: "ON",
             disable_gurobi: "ON", disable_libarchive: "ON", disable_mathsat: "ON",
             disable_soplex: "ON", disable_spot: "ON", disable_sylvan: "ON",
             disable_xerces: "ON", disable_z3: "ON",
             Developer: "OFF", ClnExact: "OFF", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          # TODO: Replace storm-basesystem:latest with the correct image for "required dependencies"
          - {name: "Debug; GMP; GMP; Required dependencies",
             buildType: "Debug",   baseImg: "storm-basesystem:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "ON", ClnExact: "OFF", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Release; GMP; GMP; Required dependencies",
             buildType: "Release", baseImg: "storm-basesystem:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "OFF", ClnExact: "OFF", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Debug; CLN; GMP; Required dependencies",
             buildType: "Debug",   baseImg: "storm-basesystem:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "ON", ClnExact: "ON", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Release; CLN; GMP; Required dependencies",
             buildType: "Release", baseImg: "storm-basesystem:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "OFF", ClnExact: "ON", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Debug; GMP; CLN; Required dependencies",
             buildType: "Debug",   baseImg: "storm-basesystem:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "ON", ClnExact: "OFF", ClnRatfunc: "ON", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Release; GMP; CLN; Required dependencies",
             buildType: "Release", baseImg: "storm-basesystem:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "OFF", ClnExact: "OFF", ClnRatfunc: "ON", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Debug; CLN; CLN; Required dependencies",
             buildType: "Debug",   baseImg: "storm-basesystem:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "ON", ClnExact: "ON", ClnRatfunc: "ON", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Release; CLN; CLN; Required dependencies",
             buildType: "Release", baseImg: "storm-basesystem:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "OFF", ClnExact: "ON", ClnRatfunc: "ON", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Debug; Minimal dependencies",
             buildType: "Debug",
             baseImg: "storm-basesystem:minimal_dependencies",
             disable_cudd: "ON", disable_glpk: "ON", disable_gmm: "ON",
             disable_gurobi: "ON", disable_libarchive: "ON", disable_mathsat: "ON",
             disable_soplex: "ON", disable_spot: "ON", disable_sylvan: "ON",
             disable_xerces: "ON", disable_z3: "ON",
             Developer: "ON", ClnExact: "OFF", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Release; Minimal dependencies",
             buildType: "Release",
             baseImg: "storm-basesystem:minimal_dependencies",
             disable_cudd: "ON", disable_glpk: "ON", disable_gmm: "ON",
             disable_gurobi: "ON", disable_libarchive: "ON", disable_mathsat: "ON",
             disable_soplex: "ON", disable_spot: "ON", disable_sylvan: "ON",
             disable_xerces: "ON", disable_z3: "ON",
             Developer: "OFF", ClnExact: "OFF", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
    uses: ./.github/workflows/test-build.yml
    with:
      NR_JOBS: "4"
      name: ${{ matrix.config.name }}
      baseImg: ${{ matrix.config.baseImg }}
      buildType: ${{ matrix.config.buildType }}
      disable_cudd: ${{ matrix.config.disable_cudd }}
      disable_glpk: ${{ matrix.config.disable_glpk }}
      disable_gmm: ${{ matrix.config.disable_gmm }}
      disable_gurobi: ${{ matrix.config.disable_gurobi }}
      disable_libarchive: ${{ matrix.config.disable_libarchive }}
      disable_mathsat: ${{ matrix.config.disable_mathsat }}
      disable_soplex: ${{ matrix.config.disable_soplex }}
      disable_spot: ${{ matrix.config.disable_spot }}
      disable_sylvan: ${{ matrix.config.disable_sylvan }}
      disable_xerces: ${{ matrix.config.disable_xerces }}
      disable_z3: ${{ matrix.config.disable_z3 }}
      Developer: ${{ matrix.config.Developer }}
      ClnExact: ${{ matrix.config.ClnExact }}
      ClnRatfunc: ${{ matrix.config.ClnRatfunc }}
      AllSanitizers: ${{ matrix.config.AllSanitizers }}
      cmakeArgs: ${{ matrix.config.cmakeArgs }}
      restore_cache: false
      save_cache: false
      install: true

  compilerTests:
    strategy:
      fail-fast: false
      matrix:
        config:
          - {name: "GCC",
             buildType: "Debug",
             Developer: "ON",
             cmakeArgs: "-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DSTORM_WARNING_AS_ERROR=ON",
             packages: "",
             dockerfile: ".github/workflows/Dockerfile.archlinux"
          }
          - {name: "GCC",
             buildType: "Release",
             Developer: "OFF",
             cmakeArgs: "-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DSTORM_WARNING_AS_ERROR=ON",
             packages: "",
             dockerfile: ".github/workflows/Dockerfile.archlinux"
          }
          - {name: "Clang",
             buildType: "Debug",
             Developer: "ON",
             cmakeArgs: "-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DSTORM_WARNING_AS_ERROR=ON",
             packages: "clang",
             dockerfile: ".github/workflows/Dockerfile.archlinux"
          }
          - {name: "Clang",
             buildType: "Release",
             Developer: "OFF",
             cmakeArgs: "-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DSTORM_WARNING_AS_ERROR=ON",
             packages: "clang",
             dockerfile: ".github/workflows/Dockerfile.archlinux"
          }
    uses: ./.github/workflows/test-build.yml
    with:
      NR_JOBS: "4"
      name: ${{ matrix.config.name }}
      buildType: ${{ matrix.config.buildType }}
      Developer: ${{ matrix.config.Developer }}
      cmakeArgs: ${{ matrix.config.cmakeArgs }}
      packages: ${{ matrix.config.packages }}
      dockerfile: ${{ matrix.config.dockerfile }}
      starterProjectCommand: "/opt/storm/resources/examples/testfiles/dtmc/brp-16-2.pm 'P=? [F s=5]'"
      restore_cache: false
      save_cache: false
      install: true

  linuxTests:
    strategy:
      fail-fast: false
      matrix:
        config:
          - {distro: "debian-12",   buildType: "Debug"}
          - {distro: "debian-12",   buildType: "Release"}
          - {distro: "debian-13",   buildType: "Debug"}
          - {distro: "debian-13",   buildType: "Release"}
          - {distro: "ubuntu-24.04", buildType: "Debug"}
          - {distro: "ubuntu-24.04", buildType: "Release"}
    uses: ./.github/workflows/test-linux.yml
    with:
      NR_JOBS: "4"
      distro: ${{ matrix.config.distro }}
      buildType: ${{ matrix.config.buildType }}
      runner: ubuntu-latest
      restore_cache: false
      save_cache: false
      install: true

  macTests:
    strategy:
      fail-fast: false
      matrix:
        config:
          - {name: "Mac 14, ARM",   distro: "macos-14",       xcode: "15.4",          buildType: "Debug"}
          - {name: "Mac 14, ARM",   distro: "macos-14",       xcode: "15.4",          buildType: "Release"}
          - {name: "Mac 15, ARM",   distro: "macos-15",       xcode: "16.4",          buildType: "Debug"}
          - {name: "Mac 15, ARM",   distro: "macos-15",       xcode: "16.4",          buildType: "Release"}
          - {name: "Mac 26, ARM",   distro: "macos-26",       xcode: "latest-stable", buildType: "Debug"}
          - {name: "Mac 26, ARM",   distro: "macos-26",       xcode: "latest-stable", buildType: "Release"}
          - {name: "Mac 26, Intel", distro: "macos-26-intel", xcode: "latest-stable", buildType: "Debug"}
          - {name: "Mac 26, Intel", distro: "macos-26-intel", xcode: "latest-stable", buildType: "Release"}
    uses: ./.github/workflows/test-mac.yml
    with:
      NR_JOBS: "4"
      name: ${{ matrix.config.name }}
      distro: ${{ matrix.config.distro }}
      xcode: ${{ matrix.config.xcode }}
      buildType: ${{ matrix.config.buildType }}
      restore_cache: false
      save_cache: false
      install: true

  deploy:
    strategy:
      fail-fast: false
      matrix:
        config:
          - {buildType: "Debug",   dockerTag: "ci-debug"}
          - {buildType: "Release", dockerTag: "ci"}
          # TODO: Add binaries build/publish configs
    uses: ./.github/workflows/test-deploy.yml
    with:
      NR_JOBS: "4"
      buildType: ${{ matrix.config.buildType }}
      dockerTag: ${{ matrix.config.dockerTag }}
    secrets: inherit

  notify:
    name: Email notification
    runs-on: ubuntu-latest
    needs: [buildTests, compilerTests, linuxTests, macTests, deploy]
    if: github.repository_owner == 'stormchecker' && always()
    steps:
      - uses: technote-space/workflow-conclusion-action@v3
      - uses: dawidd6/action-send-mail@v16
        with:
          server_address: ${{ secrets.STORM_CI_MAIL_SERVER }}
          server_port: 587
          username: ${{ secrets.STORM_CI_MAIL_USERNAME }}
          password: ${{ secrets.STORM_CI_MAIL_PASSWORD }}
          subject: "[You broke it] CI Weekly failed for ${{ github.repository }}"
          body:
            "CI job of ${{ github.repository }} has failed for commit ${{ github.sha }}.\n\
            The error type is: ${{ env.WORKFLOW_CONCLUSION }}.\n\n\
            For more information, see https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          to: ${{ secrets.STORM_CI_MAIL_RECIPIENTS }}
          from: Github Actions <you-broke-it@stormchecker.org>
        if: env.WORKFLOW_CONCLUSION != 'success'
