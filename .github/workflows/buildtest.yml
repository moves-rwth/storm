name: CI PR
# Runs on every pull request commit: compile-flag checks and short tests.
# All jobs are cached and fail-fast.

on:
  pull_request:

jobs:
  buildTests:
    strategy:
      fail-fast: true
      matrix:
        config:
          - {name: "Debug; All dependencies",
             buildType: "Debug",
             baseImg: "storm-dependencies:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "ON", ClnExact: "OFF", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Release; All dependencies",
             buildType: "Release",
             baseImg: "storm-dependencies:latest",
             disable_cudd: "OFF", disable_glpk: "OFF", disable_gmm: "OFF",
             disable_gurobi: "OFF", disable_libarchive: "OFF", disable_mathsat: "OFF",
             disable_soplex: "OFF", disable_spot: "OFF", disable_sylvan: "OFF",
             disable_xerces: "OFF", disable_z3: "OFF",
             Developer: "OFF", ClnExact: "OFF", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Release; GMP; GMP; Minimal dependencies",
             buildType: "Release",
             baseImg: "storm-basesystem:minimal_dependencies",
             disable_cudd: "ON", disable_glpk: "ON", disable_gmm: "ON",
             disable_gurobi: "ON", disable_libarchive: "ON", disable_mathsat: "ON",
             disable_soplex: "ON", disable_spot: "ON", disable_sylvan: "ON",
             disable_xerces: "ON", disable_z3: "ON",
             Developer: "OFF", ClnExact: "OFF", ClnRatfunc: "OFF", AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
    uses: ./.github/workflows/test-build.yml
    with:
      NR_JOBS: "4"
      name: ${{ matrix.config.name }}
      baseImg: ${{ matrix.config.baseImg }}
      buildType: ${{ matrix.config.buildType }}
      disable_cudd: ${{ matrix.config.disable_cudd }}
      disable_glpk: ${{ matrix.config.disable_glpk }}
      disable_gmm: ${{ matrix.config.disable_gmm }}
      disable_gurobi: ${{ matrix.config.disable_gurobi }}
      disable_libarchive: ${{ matrix.config.disable_libarchive }}
      disable_mathsat: ${{ matrix.config.disable_mathsat }}
      disable_soplex: ${{ matrix.config.disable_soplex }}
      disable_spot: ${{ matrix.config.disable_spot }}
      disable_sylvan: ${{ matrix.config.disable_sylvan }}
      disable_xerces: ${{ matrix.config.disable_xerces }}
      disable_z3: ${{ matrix.config.disable_z3 }}
      Developer: ${{ matrix.config.Developer }}
      ClnExact: ${{ matrix.config.ClnExact }}
      ClnRatfunc: ${{ matrix.config.ClnRatfunc }}
      AllSanitizers: ${{ matrix.config.AllSanitizers }}
      cmakeArgs: ${{ matrix.config.cmakeArgs }}
      restore_cache: true
      save_cache: true
      install: false

  compilerTests:
    strategy:
      fail-fast: true
      matrix:
        config:
          - {name: "GCC",
             buildType: "Debug",
             Developer: "ON",
             cmakeArgs: "-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DSTORM_WARNING_AS_ERROR=ON",
             packages: "",
             dockerfile: ".github/workflows/Dockerfile.archlinux"
          }
          - {name: "Clang",
             buildType: "Debug",
             Developer: "ON",
             cmakeArgs: "-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DSTORM_WARNING_AS_ERROR=ON",
             packages: "clang",
             dockerfile: ".github/workflows/Dockerfile.archlinux"
          }
    uses: ./.github/workflows/test-build.yml
    with:
      NR_JOBS: "4"
      name: ${{ matrix.config.name }}
      buildType: ${{ matrix.config.buildType }}
      Developer: ${{ matrix.config.Developer }}
      cmakeArgs: ${{ matrix.config.cmakeArgs }}
      packages: ${{ matrix.config.packages }}
      dockerfile: ${{ matrix.config.dockerfile }}
      starterProjectCommand: "/opt/storm/resources/examples/testfiles/dtmc/brp-16-2.pm 'P=? [F s=5]'"
      restore_cache: true
      save_cache: true
      install: false

  linuxTests:
    strategy:
      fail-fast: true
      matrix:
        config:
          - {distro: "debian-12",    buildType: "Release"}
          - {distro: "ubuntu-24.04", buildType: "Release"}
    uses: ./.github/workflows/test-linux.yml
    with:
      NR_JOBS: "4"
      distro: ${{ matrix.config.distro }}
      buildType: ${{ matrix.config.buildType }}
      runner: ubuntu-latest
      restore_cache: true
      save_cache: true
      install: false

  macTests:
    strategy:
      fail-fast: true
      matrix:
        config:
          - {name: "Mac 14, ARM",    distro: "macos-14",       xcode: "15.4",          buildType: "Release"}
          - {name: "Mac 26, ARM",    distro: "macos-26",       xcode: "latest-stable", buildType: "Release"}
          - {name: "Mac 26, Intel",  distro: "macos-26-intel", xcode: "latest-stable", buildType: "Release"}
    uses: ./.github/workflows/test-mac.yml
    with:
      NR_JOBS: "4"
      name: ${{ matrix.config.name }}
      distro: ${{ matrix.config.distro }}
      xcode: ${{ matrix.config.xcode }}
      buildType: ${{ matrix.config.buildType }}
      restore_cache: true
      save_cache: true
      install: false
