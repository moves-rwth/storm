name: Build Test
# Builds and tests storm on various platforms
# also deploys images to DockerHub

on:
  schedule:
    # run daily
    - cron: '0 6 * * *'
  # needed to trigger the workflow manually
  workflow_dispatch:
  pull_request:

jobs:
  indepthTests:
    strategy:
      matrix:
        config:
          - {name: "GMP exact; GMP rational functions; All dependencies",
             baseImg: "storm-dependencies:latest",
             buildType: "Debug",
             disable_cudd: "OFF",
             disable_glpk: "OFF",
             disable_gmm: "OFF",
             disable_gurobi: "OFF",
             disable_libarchive: "OFF",
             disable_mathsat: "OFF",
             disable_soplex: "OFF",
             disable_spot: "OFF",
             disable_sylvan: "OFF",
             disable_xerces: "OFF",
             disable_z3: "OFF",
             Developer: "ON",
             ClnExact: "OFF",
             ClnRatfunc: "OFF",
             AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "CLN exact; GMP rational functions; All dependencies",
             baseImg: "storm-dependencies:latest",
             buildType: "Debug",
             disable_cudd: "OFF",
             disable_glpk: "OFF",
             disable_gmm: "OFF",
             disable_gurobi: "OFF",
             disable_libarchive: "OFF",
             disable_mathsat: "OFF",
             disable_soplex: "OFF",
             disable_spot: "OFF",
             disable_sylvan: "OFF",
             disable_xerces: "OFF",
             disable_z3: "OFF",
             Developer: "ON",
             ClnExact: "ON",
             ClnRatfunc: "OFF",
             AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "CLN exact; CLN rational functions; All dependencies",
             baseImg: "storm-dependencies:latest",
             buildType: "Debug",
             disable_cudd: "OFF",
             disable_glpk: "OFF",
             disable_gmm: "OFF",
             disable_gurobi: "OFF",
             disable_libarchive: "OFF",
             disable_mathsat: "OFF",
             disable_soplex: "OFF",
             disable_spot: "OFF",
             disable_sylvan: "OFF",
             disable_xerces: "OFF",
             disable_z3: "OFF",
             Developer: "ON",
             ClnExact: "ON",
             ClnRatfunc: "ON",
             AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "GMP exact; CLN rational functions; No dependencies",
             baseImg: "storm-dependencies:latest",
             buildType: "Debug",
             disable_cudd: "ON",
             disable_glpk: "ON",
             disable_gmm: "ON",
             disable_gurobi: "ON",
             disable_libarchive: "ON",
             disable_mathsat: "ON",
             disable_soplex: "ON",
             disable_spot: "ON",
             disable_sylvan: "ON",
             disable_xerces: "ON",
             disable_z3: "ON",
             Developer: "ON",
             ClnExact: "OFF",
             ClnRatfunc: "ON",
             AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - {name: "Minimal dependencies (without CLN)",
             baseImg: "storm-basesystem:minimal_dependencies",
             buildType: "Debug",
             disable_cudd: "ON",
             disable_glpk: "ON",
             disable_gmm: "ON",
             disable_gurobi: "ON",
             disable_libarchive: "ON",
             disable_mathsat: "ON",
             disable_soplex: "ON",
             disable_spot: "ON",
             disable_sylvan: "ON",
             disable_xerces: "ON",
             disable_z3: "ON",
             Developer: "ON",
             ClnExact: "OFF",
             ClnRatfunc: "OFF",
             AllSanitizers: "OFF",
             cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
    uses: ./.github/workflows/test-build.yml
    with:
      NR_JOBS: "4"
      name: ${{ matrix.config.name }}
      baseImg: ${{ matrix.config.baseImg }}
      buildType: ${{ matrix.config.buildType }}
      disable_cudd: ${{ matrix.config.disable_cudd }}
      disable_glpk: ${{ matrix.config.disable_glpk }}
      disable_gmm: ${{ matrix.config.disable_gmm }}
      disable_gurobi: ${{ matrix.config.disable_gurobi }}
      disable_libarchive: ${{ matrix.config.disable_libarchive }}
      disable_mathsat: ${{ matrix.config.disable_mathsat }}
      disable_soplex: ${{ matrix.config.disable_soplex }}
      disable_spot: ${{ matrix.config.disable_spot }}
      disable_sylvan: ${{ matrix.config.disable_sylvan }}
      disable_xerces: ${{ matrix.config.disable_xerces }}
      disable_z3: ${{ matrix.config.disable_z3 }}
      Developer: ${{ matrix.config.Developer }}
      ClnExact: ${{ matrix.config.ClnExact }}
      ClnRatfunc: ${{ matrix.config.ClnRatfunc }}
      AllSanitizers: ${{ matrix.config.AllSanitizers }}
      cmakeArgs: ${{ matrix.config.cmakeArgs }}
      cache: ${{ github.ref != 'refs/heads/master' }}

  compilerTests:
    strategy:
      matrix:
        config:
          - { name: "GCC",
              buildType: "Debug",
              Developer: "ON",
              cmakeArgs: "-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DSTORM_WARNING_AS_ERROR=ON",
              packages: "",
              dockerfile: ".github/workflows/Dockerfile.archlinux"
          }
          - { name: "Clang",
              buildType: "Debug",
              Developer: "ON",
              cmakeArgs: "-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DSTORM_WARNING_AS_ERROR=ON",
              packages: "clang",
              dockerfile: ".github/workflows/Dockerfile.archlinux"
          }
          - { name: "musl",
              buildType: "Debug",
              Developer: "ON",
              cmakeArgs: "-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DSTORM_WARNING_AS_ERROR=ON",
              packages: "",
              dockerfile: ".github/workflows/Dockerfile.alpine"
          }
    uses: ./.github/workflows/test-build.yml
    with:
      NR_JOBS: "4"
      name: ${{ matrix.config.name }}
      buildType: ${{ matrix.config.buildType }}
      Developer: ${{ matrix.config.Developer }}
      cmakeArgs: ${{ matrix.config.cmakeArgs }}
      packages: ${{ matrix.config.packages }}
      dockerfile: ${{ matrix.config.dockerfile }}
      starterProjectCommand: "/opt/storm/resources/examples/testfiles/dtmc/brp-16-2.pm 'P=? [F s=5]'"
      cache: ${{ github.ref != 'refs/heads/master' }}

  linuxTests:
    uses: ./.github/workflows/test-linux.yml
    strategy:
      matrix:
        distro: ["debian-12", "ubuntu-24.04", "debian-13"]
        buildType: ["Release"]
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    with:
      NR_JOBS: "4"
      distro: ${{ matrix.distro }}
      buildType: ${{ matrix.buildType }}
      runner: ${{ matrix.runner }}
      cache: ${{ github.ref != 'refs/heads/master' }}

  macTests:
    strategy:
      matrix:
        config:          
          - {name: "MacOS 14, ARM",
             distro: "macos-14",
             xcode: "15.4",
             buildType: "Debug"
          }
          - {name: "MacOS 15, ARM",
             distro: "macos-15",
             xcode: "16.4",
             buildType: "Debug"
          }
          - {name: "MacOS 26, ARM",
             distro: "macos-26",
             xcode: "latest-stable",
             buildType: "Debug"
          }
          - {name: "MacOS 26, Intel",
             distro: "macos-26-intel",
             xcode: "latest-stable",
             buildType: "Debug"
          }
    uses: ./.github/workflows/test-mac.yml
    with:
      NR_JOBS: "4"
      name: ${{ matrix.config.name }}
      distro: ${{ matrix.config.distro }}
      xcode: ${{ matrix.config.xcode }}
      buildType: ${{ matrix.config.buildType }}
      cache: ${{ github.ref != 'refs/heads/master' }}

  deploy:
    strategy:
      matrix:
        config:
          - { buildType: "Debug",
              dockerTag: "ci-debug",
              baseImg: "storm-dependencies:latest",
              Developer: "ON",
              cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
          - { buildType: "Release",
              dockerTag: "ci",
              baseImg: "storm-dependencies:latest",
              Developer: "OFF",
              cmakeArgs: "-DSTORM_WARNING_AS_ERROR=ON"
          }
    uses: ./.github/workflows/test-deploy.yml
    with:
      NR_JOBS: "4"
      buildType: ${{ matrix.config.buildType }}
      dockerTag: ${{ matrix.config.dockerTag }}
      baseImg: ${{ matrix.config.baseImg }}
      Developer: ${{ matrix.config.Developer }}
      cmakeArgs: ${{ matrix.config.cmakeArgs }}
    secrets:
      STORM_CI_DOCKER_USERNAME: ${{ secrets.STORM_CI_DOCKER_USERNAME }}
      STORM_CI_DOCKER_TOKEN: ${{ secrets.STORM_CI_DOCKER_TOKEN }}

  notify:
    name: Email notification
    runs-on: ubuntu-latest
    needs: [indepthTests, compilerTests, linuxTests, macTests, deploy]
    # Only run in main repo and even if previous step failed
    if: github.repository_owner == 'stormchecker' && always()
    steps:
      - uses: technote-space/workflow-conclusion-action@v3
      - uses: dawidd6/action-send-mail@v16
        with:
          server_address: ${{ secrets.STORM_CI_MAIL_SERVER }}
          server_port: 587
          username: ${{ secrets.STORM_CI_MAIL_USERNAME }}
          password: ${{ secrets.STORM_CI_MAIL_PASSWORD }}
          subject: "[You broke it] CI run failed for ${{ github.repository }}"
          body:
            "CI job of ${{ github.repository }} has failed for commit ${{ github.sha }}.\n\
            The error type is: ${{ env.WORKFLOW_CONCLUSION }}.\n\n\
            For more information, see https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          to: ${{ secrets.STORM_CI_MAIL_RECIPIENTS }}
          from: Github Actions <you-broke-it@stormchecker.org>
        if: env.WORKFLOW_CONCLUSION != 'success' # notify only if failure
